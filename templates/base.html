<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Kroger Retail Analytics{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d40;
    --accent: #00c896;
    --accent2: #3b82f6;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  nav {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:0 2rem;
    display:flex;
    align-items:center;
    gap:2rem;
    height:60px;
    position:sticky;
    top:0;
    z-index:100;
  }
  nav .logo {
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:1.2rem;
    color:var(--accent);
    margin-right:auto;
    letter-spacing:-0.5px;
  }
  nav a {
    color:var(--muted);
    text-decoration:none;
    font-size:0.875rem;
    font-weight:500;
    padding:0.4rem 0.8rem;
    border-radius:6px;
    transition:all 0.2s;
  }
  nav a:hover, nav a.active { color:var(--text); background:var(--border); }

  .container { max-width:1200px; margin:0 auto; padding:2rem; }

  h1,h2,h3 { font-family:'Syne',sans-serif; }
  h1 { font-size:2rem; font-weight:800; margin-bottom:0.5rem; }
  h2 { font-size:1.4rem; font-weight:600; margin-bottom:1rem; color:var(--accent); }

  .card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:1.5rem;
    margin-bottom:1.5rem;
  }

  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  th {
    background:#0f172a;
    color:var(--accent);
    font-family:'Syne',sans-serif;
    font-weight:600;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding:0.75rem 1rem;
    text-align:left;
    border-bottom:2px solid var(--border);
  }
  td { padding:0.6rem 1rem; border-bottom:1px solid var(--border); color:var(--text); }
  tr:hover td { background:rgba(0,200,150,0.04); }

  .btn {
    display:inline-block;
    background:var(--accent);
    color:#000;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:0.875rem;
    padding:0.6rem 1.5rem;
    border-radius:8px;
    border:none;
    cursor:pointer;
    text-decoration:none;
    transition:all 0.2s;
  }
  .btn:hover { background:#00e6ac; transform:translateY(-1px); }
  .btn-secondary { background:var(--border); color:var(--text); }
  .btn-secondary:hover { background:#2d3748; }

  input[type=text], input[type=number], input[type=email], input[type=password], input[type=file] {
    background:#0f172a;
    border:1px solid var(--border);
    color:var(--text);
    padding:0.65rem 1rem;
    border-radius:8px;
    font-size:0.875rem;
    font-family:'DM Sans',sans-serif;
    width:100%;
    transition:border-color 0.2s;
  }
  input:focus { outline:none; border-color:var(--accent); }

  label { display:block; font-size:0.8rem; font-weight:500; color:var(--muted); margin-bottom:0.4rem; }
  .form-group { margin-bottom:1rem; }

  .flash {
    background:rgba(0,200,150,0.1);
    border:1px solid var(--accent);
    color:var(--accent);
    padding:0.75rem 1rem;
    border-radius:8px;
    margin-bottom:1rem;
    font-size:0.875rem;
  }

  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; margin-bottom:1.5rem; }
  .stat-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:1.2rem;
    text-align:center;
  }
  .stat-card .value { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; color:var(--accent); }
  .stat-card .label { font-size:0.75rem; color:var(--muted); margin-top:0.3rem; }

  .table-wrap { overflow-x:auto; }
  .badge {
    display:inline-block;
    padding:0.2rem 0.5rem;
    border-radius:4px;
    font-size:0.7rem;
    font-weight:600;
    background:rgba(0,200,150,0.15);
    color:var(--accent);
  }
  .subtitle { color:var(--muted); font-size:0.9rem; margin-bottom:2rem; }
</style>
</head>
<body>
<nav>
  <span class="logo">◈ KrogerAnalytics</span>
  <a href="/search">Search</a>
  <a href="/hshd10">HSHD #10</a>
  <a href="/dashboard">Dashboard</a>
  <a href="/ml">ML Models</a>
  <a href="/upload">Upload</a>
</nav>
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
