<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Kroger Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --border: #1e2d40;
    --accent: #00c896; --text: #e2e8f0; --muted: #64748b;
    --danger: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(0,200,150,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.06) 0%, transparent 60%);
  }
  .box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:2.5rem;
    width:100%;
    max-width:440px;
  }
  .logo {
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:1.5rem;
    color:var(--accent);
    margin-bottom:0.4rem;
  }
  .tagline { color:var(--muted); font-size:0.875rem; margin-bottom:1.8rem; }

  .tabs { display:flex; gap:0; margin-bottom:1.8rem; border-bottom:2px solid var(--border); }
  .tab {
    flex:1; text-align:center; padding:0.65rem;
    font-family:'Syne',sans-serif; font-weight:600; font-size:0.875rem;
    color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;
    margin-bottom:-2px; transition:all 0.2s;
  }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  .form { display:none; }
  .form.active { display:block; }
  .form-group { margin-bottom:1.1rem; }
  label { display:block; font-size:0.78rem; font-weight:500; color:var(--muted); margin-bottom:0.4rem; }
  input {
    background:#0f172a; border:1px solid var(--border);
    color:var(--text); padding:0.7rem 1rem;
    border-radius:8px; font-size:0.875rem;
    font-family:'DM Sans',sans-serif; width:100%;
    transition:border-color 0.2s;
  }
  input:focus { outline:none; border-color:var(--accent); }
  .btn {
    width:100%; background:var(--accent); color:#000;
    font-family:'Syne',sans-serif; font-weight:700;
    font-size:0.9rem; padding:0.75rem;
    border-radius:8px; border:none; cursor:pointer;
    margin-top:0.5rem; transition:all 0.2s;
  }
  .btn:hover { background:#00e6ac; transform:translateY(-1px); }
  .msg {
    padding:0.65rem 1rem; border-radius:8px;
    font-size:0.82rem; margin-bottom:1rem; display:none;
  }
  .msg.success { background:rgba(0,200,150,0.1); border:1px solid var(--accent); color:var(--accent); display:block; }
  .msg.error { background:rgba(239,68,68,0.1); border:1px solid var(--danger); color:var(--danger); display:block; }
  .switch { text-align:center; color:var(--muted); font-size:0.82rem; margin-top:1rem; }
  .switch span { color:var(--accent); cursor:pointer; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">◈ KrogerAnalytics</div>
  <div class="tagline">Retail Intelligence Platform</div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- Sign In -->
  <div class="form active" id="signin-form">
    <div id="signin-msg" class="msg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="signin-username" placeholder="Enter your username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="Enter your password">
    </div>
    <button class="btn" onclick="signIn()">Sign In →</button>
    <div class="switch">Don't have an account? <span onclick="switchTab('signup')">Sign Up</span></div>
  </div>

  <!-- Sign Up -->
  <div class="form" id="signup-form">
    <div id="signup-msg" class="msg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="signup-username" placeholder="Choose a username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="signup-confirm" placeholder="Confirm your password">
    </div>
    <button class="btn" onclick="signUp()">Create Account →</button>
    <div class="switch">Already have an account? <span onclick="switchTab('signin')">Sign In</span></div>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('signin-form').classList.toggle('active', tab === 'signin');
    document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function signUp() {
    const username = document.getElementById('signup-username').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;

    if (!username || !email || !password || !confirm) {
      showMsg('signup-msg', 'error', 'Please fill in all fields.'); return;
    }
    if (password !== confirm) {
      showMsg('signup-msg', 'error', 'Passwords do not match.'); return;
    }
    if (password.length < 6) {
      showMsg('signup-msg', 'error', 'Password must be at least 6 characters.'); return;
    }

    const users = JSON.parse(localStorage.getItem('kroger_users') || '{}');
    if (users[username]) {
      showMsg('signup-msg', 'error', 'Username already exists. Please sign in.'); return;
    }

    users[username] = { email, password };
    localStorage.setItem('kroger_users', JSON.stringify(users));
    localStorage.setItem('kroger_session', username);
    showMsg('signup-msg', 'success', 'Account created! Redirecting to dashboard...');
    setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
  }

  function signIn() {
    const username = document.getElementById('signin-username').value.trim();
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;

    if (!username || !email || !password) {
      showMsg('signin-msg', 'error', 'Please fill in all fields.'); return;
    }

    const users = JSON.parse(localStorage.getItem('kroger_users') || '{}');
    if (!users[username]) {
      showMsg('signin-msg', 'error', 'Username not found. Please sign up first.'); return;
    }
    if (users[username].password !== password) {
      showMsg('signin-msg', 'error', 'Incorrect password. Please try again.'); return;
    }
    if (users[username].email !== email) {
      showMsg('signin-msg', 'error', 'Email does not match. Please try again.'); return;
    }

    localStorage.setItem('kroger_session', username);
    showMsg('signin-msg', 'success', 'Welcome back, ' + username + '! Redirecting...');
    setTimeout(() => { window.location.href = '/dashboard'; }, 800);
  }
</script>
</body>
</html>
