<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Kroger Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --border: #1e2d40;
    --accent: #00c896; --text: #e2e8f0; --muted: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(0,200,150,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.06) 0%, transparent 60%);
  }
  .login-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:2.5rem;
    width:100%;
    max-width:420px;
  }
  .logo {
    font-family:'Syne',sans-serif;
    font-weight:800;
    font-size:1.5rem;
    color:var(--accent);
    margin-bottom:0.5rem;
  }
  .subtitle { color:var(--muted); font-size:0.875rem; margin-bottom:2rem; }
  h2 { font-family:'Syne',sans-serif; font-size:1.3rem; margin-bottom:1.5rem; }
  .form-group { margin-bottom:1.2rem; }
  label { display:block; font-size:0.8rem; font-weight:500; color:var(--muted); margin-bottom:0.4rem; }
  input {
    background:#0f172a; border:1px solid var(--border);
    color:var(--text); padding:0.7rem 1rem;
    border-radius:8px; font-size:0.875rem;
    font-family:'DM Sans',sans-serif; width:100%;
    transition:border-color 0.2s;
  }
  input:focus { outline:none; border-color:var(--accent); }
  .btn {
    width:100%; background:var(--accent); color:#000;
    font-family:'Syne',sans-serif; font-weight:700;
    font-size:0.9rem; padding:0.75rem;
    border-radius:8px; border:none; cursor:pointer;
    margin-top:0.5rem; transition:all 0.2s;
  }
  .btn:hover { background:#00e6ac; transform:translateY(-1px); }
  .skip { text-align:center; margin-top:1rem; font-size:0.8rem; color:var(--muted); }
  .skip a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">◈ KrogerAnalytics</div>
  <div class="subtitle">Retail Intelligence Platform</div>
  <h2>Sign In</h2>
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email">
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>
  <div class="skip">
    Skip login? <a href="/search">Go to Dashboard</a>
  </div>
</div>
</body>
</html>
